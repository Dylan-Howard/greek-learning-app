services:
  # SQL Server 2022
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: koine-db
    user: root
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - ./db-data:/var/opt/mssql
    networks:
      - koine-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Unified Backend
  backend:
    build:
      context: ./backend
      dockerfile: KoineBackend.Dockerfile
    container_name: koine-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=Koine;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLongForDevelopment!
      - JwtSettings__Issuer=KoineAPI
      - JwtSettings__Audience=KoineClient
    ports:
      - "5001:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - koine-network

  # Next.js Frontend
  frontend:
    build:
      context: ./GreekLearningApp-Frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5001/api
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_b25lLW1vY2Nhc2luLTIwLmNsZXJrLmFjY291bnRzLmRldiQ
    container_name: koine-frontend
    env_file:
      - ./GreekLearningApp-Frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
      - INTERNAL_API_URL=http://backend/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - koine-network

networks:
  koine-network:
    driver: bridge
