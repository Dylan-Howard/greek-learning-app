name: E2E

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Install
        run: npm --prefix frontend ci

      - name: Install Playwright Browsers
        run: npx --prefix frontend playwright install --with-deps

      - name: Start Test Stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait For Test Stack
        run: |
          ./scripts/wait-for-url.sh "http://localhost:5001/api/books" 120
          ./scripts/wait-for-url.sh "http://localhost:3000" 120

      - name: Playwright E2E Tests
        run: npm --prefix frontend run test:e2e

      - name: Stop Test Stack
        if: always()
        run: docker compose -f docker-compose.test.yml down --remove-orphans
