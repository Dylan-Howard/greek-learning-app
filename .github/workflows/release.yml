name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute CalVer tag
        id: calver
        run: |
          set -euo pipefail
          DATE="$(date -u +'%Y.%m.%d')"
          git fetch --tags
          LAST_TAG="$(git tag -l "${DATE}.*" | sort -V | tail -n 1)"
          if [ -z "$LAST_TAG" ]; then
            PATCH=0
          else
            PATCH=$(( ${LAST_TAG##*.} + 1 ))
          fi
          TAG="${DATE}.${PATCH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.calver.outputs.tag }}"
          git push origin "${{ steps.calver.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.calver.outputs.tag }}"
          generate_release_notes: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ steps.calver.outputs.tag }}
            ghcr.io/${{ github.repository }}-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ steps.calver.outputs.tag }}
            ghcr.io/${{ github.repository }}-frontend:latest
